{% extends 'base.html' %}

{% block content %}

<h2>Tất cả sản phẩm</h2>

<div class="products">

{% for p in products %}

<div class="product">

<img src="{{p.image}}" width="200">

<h3>{{p.name}}</h3>

<p>{{p.price}} VND</p>

<a href="/product/{{p.id}}/">Xem</a>

</div>

{% endfor %}

</div>

{% endblock %}
